<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Notes</h1>
      <button id="btn-new" class="btn btn-primary">+ New Note</button>
    </header>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <h2 id="modal-title">New Note</h2>
        <input id="input-title" type="text" placeholder="Title" maxlength="255" />
        <textarea id="input-content" placeholder="Write your note here..." rows="6"></textarea>
        <div class="modal-actions">
          <button id="btn-cancel" class="btn btn-secondary">Cancel</button>
          <button id="btn-save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>

    <div id="notes-grid" class="notes-grid">
      <p id="empty-msg" class="empty-msg hidden">No notes yet. Create your first one!</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
